[platformio]
default_envs = esp32dev

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
; U8g2 is vendored in lib/ for reproducible local builds.
lib_ldf_mode = chain+
build_flags =
    -std=gnu++17
    -D APP_LOG_LEVEL=2
    -D CORE_DEBUG_LEVEL=0
build_src_flags =
    -fno-exceptions
    -fno-rtti
build_unflags =
    -std=gnu++11
    -std=gnu++14

[env:esp32dev]
board = esp32dev
